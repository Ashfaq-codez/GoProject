<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="./desert-island.png">
    <style>
        /* Core Neo-Brutalist Styles */
        body { background-color: #f4f4f5; }
        
        .brutal-border { border: 3px solid #000000; }
        
        .brutal-shadow { 
            box-shadow: 6px 6px 0px #000000; 
            transition: all 0.15s ease-in-out;
        }
        
        .brutal-shadow-sm { 
            box-shadow: 3px 3px 0px #000000; 
            transition: all 0.15s ease-in-out;
        }

        .brutal-input {
            border: 3px solid #000000;
            outline: none;
            transition: background-color 0.2s;
        }
        .brutal-input:focus { background-color: #fef08a; } /* highlight yellow */

        /* ----------------------------------------- */
        /* MOBILE DATE INPUT: THE NUCLEAR OPTION     */
        /* ----------------------------------------- */
        input[type="date"].brutal-input {
            /* 1. Strip absolutely all mobile browser defaults */
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            appearance: none !important;
            
            /* 2. iOS forces rounded corners on dates. Nuke them. */
            border-radius: 0 !important; 
            
            /* 3. iOS sometimes makes inputs semi-transparent. Force solid. */
            opacity: 1 !important;
            background-color: #ffffff !important;
            color: #000000 !important;
            
            /* 4. Layout fixes to prevent squishing */
             
            min-height: 3.5rem;
            cursor: pointer;
        }

        /* Fix the text alignment inside the input on Safari */
        input[type="date"]::-webkit-datetime-edit {
            padding: 0;
            line-height: normal;
        }

        /* Force the calendar icon to be a massive Brutalist button */
        input[type="date"]::-webkit-calendar-picker-indicator {
            background-color: #bbf7d0 !important;
            border: 2px solid #000000 !important;
            box-shadow: 3px 3px 0px #000000 !important;
            border-radius: 0 !important;
            padding: 6px !important;
            width: 1.8rem !important;
            height: 1.8rem !important;
            opacity: 1 !important; 
            cursor: pointer;
            /* Prevent the icon from being shrunk if the screen is too small */
            flex-shrink: 0; 
            transition: all 0.1s;
        }

        input[type="date"]::-webkit-calendar-picker-indicator:active {
            box-shadow: 0px 0px 0px #000000 !important;
            transform: translate(3px, 3px);
        }

        /* Button Variants */
        .brutal-btn {
            border: 3px solid #000000;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
        }
        .brutal-btn:active:not(:disabled) {
            box-shadow: 0px 0px 0px #000000 !important;
            transform: translate(4px, 4px) !important;
        }
        .brutal-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Action Colors */
        .bg-primary { background-color: #bbf7d0; } /* Green */
        .bg-edit { background-color: #bfdbfe; }    /* Blue */
        .bg-delete { background-color: #fca5a5; }  /* Red */
        .bg-panel { background-color: #e9d5ff; }   /* Purple for the records panel */

        /* Modal Backdrop */
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body class="text-black font-sans p-4 md:p-8 max-w-5xl mx-auto relative">

    <header class="mb-10 border-b-4 border-black pb-4">
        <h1 class="text-5xl font-black uppercase tracking-tighter">User Directory.</h1>
        <p class="text-xl font-bold mt-2 text-gray-700">Production API Active</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1">
            <div class="bg-white brutal-border brutal-shadow p-6 sticky top-8">
                <h2 class="text-2xl font-black mb-6 uppercase border-b-2 border-black pb-2">New User</h2>
                <form id="userForm" class="flex flex-col gap-5">
                    <div>
                        <label class="block font-black mb-2 uppercase text-sm">Full Name</label>
                        <input type="text" id="name" required class="brutal-input w-full p-3 font-bold" placeholder="e.g. John Doe">
                    </div>
                    <div>
                        <label class="block font-black mb-2 uppercase text-sm">Date of Birth</label>
                        <input type="date" id="dob" required class="brutal-input w-full p-3 font-bold">
                    </div>
                    <button type="submit" class="brutal-btn bg-primary brutal-shadow-sm py-4 mt-4 text-lg hover:bg-green-300">Add User</button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-panel brutal-border brutal-shadow p-6 flex flex-col h-full"> 
                <div class="flex justify-between items-end mb-6 border-b-2 border-black pb-2">
                    <h2 class="text-2xl font-black uppercase">System Records</h2>
                    <span class="font-bold text-sm bg-white px-2 py-1 brutal-border">Live Data</span>
                </div>
                
                <div id="userList" class="flex flex-col gap-4 flex-grow">
                    <p class="font-bold text-lg animate-pulse">Loading records...</p>
                </div>
                
                <div class="mt-8 flex justify-between items-center bg-white brutal-border p-3 brutal-shadow-sm">
                    <button id="prevBtn" class="brutal-btn px-5 py-2 hover:bg-gray-200 disabled:hover:bg-transparent">Prev</button>
                    <span id="pageInfo" class="font-black text-xl tracking-wide">Page 1</span>
                    <button id="nextBtn" class="brutal-btn px-5 py-2 hover:bg-gray-200 disabled:hover:bg-transparent">Next</button>
                </div>
            </div>
        </div>

    </div>

    <div id="editModal" class="fixed inset-0 modal-backdrop hidden justify-center items-center z-50 p-4">
        <div class="bg-white brutal-border brutal-shadow p-8 max-w-md w-full relative">
            <button id="closeModalBtn" class="absolute top-4 right-4 font-black text-xl hover:text-red-600">X</button>
            <h2 class="text-3xl font-black mb-6 uppercase">Edit User</h2>
            
            <form id="editForm" class="flex flex-col gap-5">
                <input type="hidden" id="editId">
                <div>
                    <label class="block font-black mb-2 uppercase text-sm">Update Name</label>
                    <input type="text" id="editName" required class="brutal-input w-full p-3 font-bold">
                </div>
                <div>
                    <label class="block font-black mb-2 uppercase text-sm">Update DOB</label>
                    <input type="date" id="editDob" required class="brutal-input w-full p-3 font-bold">
                </div>
                <div class="flex gap-4 mt-4">
                    <button type="submit" class="brutal-btn bg-edit brutal-shadow-sm py-3 flex-grow hover:bg-blue-300">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://goproject-1-s6i6.onrender.com/users';
        
        let currentPage = 1;
        const limit = 3; 

        // --- CORE CRUD OPERATIONS ---

        async function fetchUsers() {
            const listContainer = document.getElementById('userList');
            const offset = (currentPage - 1) * limit;

            try {
                const response = await fetch(`${API_URL}?limit=${limit}&offset=${offset}`);
                const users = await response.json();
                
                listContainer.innerHTML = ''; 

                if (users.length === 0 && currentPage === 1) {
                    listContainer.innerHTML = `
                        <div class="bg-white brutal-border p-8 text-center brutal-shadow-sm">
                            <p class="font-black text-xl">No users found.</p>
                            <p class="font-medium mt-2">Use the panel on the left to add your first record.</p>
                        </div>`;
                    updatePaginationButtons(0);
                    return;
                }

                if (users.length === 0 && currentPage > 1) {
                    currentPage--;
                    fetchUsers();
                    return;
                }

                users.forEach(user => {
                    const userCard = document.createElement('div');
                    userCard.className = 'bg-white brutal-border brutal-shadow-sm p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:-translate-y-1 hover:brutal-shadow transition-transform';
                    
                    // Generate a deterministic robot avatar based on the user's name
                // You can change 'bottts' to 'pixel-art' or 'shapes' if you prefer!
                const avatarUrl = `https://api.dicebear.com/8.x/bottts/svg?seed=${encodeURIComponent(user.name)}&backgroundColor=bbf7d0,bfdbfe,fef08a,fca5a5`;

                userCard.innerHTML = `
                    <div class="flex items-center gap-4 flex-grow mb-4 md:mb-0">
                        <img src="${avatarUrl}" alt="${user.name}'s avatar" 
                             class="w-16 h-16 brutal-border brutal-shadow-sm object-cover bg-white">
                        
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <p class="text-2xl font-black">${user.name}</p>
                                <span class="bg-[#fef08a] px-2 py-0.5 brutal-border text-sm font-bold">Age: ${user.age}</span>
                            </div>
                            <p class="text-sm font-bold text-gray-600">ID: ${user.id} | Born: ${formattedDate}</p>
                        </div>
                    </div>
                    
                    <div class="flex gap-2 w-full md:w-auto">
                        <button class="edit-btn brutal-btn bg-edit px-4 py-2 text-sm flex-grow md:flex-none hover:bg-blue-300">Edit</button>
                        <button class="delete-btn brutal-btn bg-delete px-4 py-2 text-sm flex-grow md:flex-none hover:bg-red-400">Del</button>
                    </div>
                `;

                    // Attach Event Listeners safely using standard DOM methods
                    const editBtn = userCard.querySelector('.edit-btn');
                    editBtn.addEventListener('click', () => openEditModal(user.id, user.name, formattedDate));

                    const deleteBtn = userCard.querySelector('.delete-btn');
                    deleteBtn.addEventListener('click', () => deleteUser(user.id));

                    listContainer.appendChild(userCard);
                });

                updatePaginationButtons(users.length);
                
            } catch (error) {
                listContainer.innerHTML = `
                    <div class="bg-red-200 brutal-border p-4">
                        <p class="font-black text-red-800">Error connecting to production API.</p>
                    </div>`;
            }
        }

        async function deleteUser(id) {
            // A simple brutalist confirmation
            if (!confirm("Are you sure you want to delete this record? This cannot be undone.")) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    fetchUsers(); // Refresh the list
                } else {
                    alert("Failed to delete user.");
                }
            } catch (error) {
                alert("Network error while deleting.");
            }
        }

        // --- FORM HANDLING ---

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const dob = document.getElementById('dob').value;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, dob })
                });

                if (response.ok) {
                    document.getElementById('userForm').reset();
                    currentPage = 1; 
                    fetchUsers(); 
                } else {
                    const errData = await response.json();
                    alert("API Error: " + errData.error);
                }
            } catch (error) {
                alert("Failed to connect to the server.");
            }
        });

        // --- MODAL LOGIC ---

        const modal = document.getElementById('editModal');

        function openEditModal(id, name, dob) {
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editDob').value = dob;
            
            // Show modal using Tailwind classes
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeEditModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        document.getElementById('closeModalBtn').addEventListener('click', closeEditModal);

        // Close modal if user clicks the dark background outside the white box
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeEditModal();
        });

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value;
            const dob = document.getElementById('editDob').value;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT', // Assuming your Go API uses PUT for updates
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, dob })
                });

                if (response.ok) {
                    closeEditModal();
                    fetchUsers(); 
                } else {
                    const errData = await response.json();
                    alert("API Error: " + errData.error);
                }
            } catch (error) {
                alert("Failed to connect to the server.");
            }
        });

        // --- PAGINATION LOGIC ---

        function updatePaginationButtons(currentDataLength) {
            document.getElementById('pageInfo').innerText = `PAGE ${currentPage}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentDataLength < limit;
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                fetchUsers();
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentPage++;
            fetchUsers();
        });

        // Initial Boot
        fetchUsers();
    </script>
</body>
</html>
